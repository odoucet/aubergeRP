services:
  localai:
    image: quay.io/go-skynet/local-ai:latest-gpu-nvidia-cuda-12
    container_name: auberge-ai
    volumes:
      - ./models:/build/models
      - ../data/models:/build/models/gguf:ro
    ports:
      - "8080:8080"
    environment:
      MODELS_PATH: /build/models
      LOCALAI_DISABLE_AUTOLOAD_GALLERIES: "true"

  auberge-app:
    depends_on:
      - localai
