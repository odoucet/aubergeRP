services:
  localai:
    image: localai/localai:latest-gpu-nvidia-cuda-12
    container_name: auberge-ai
    volumes:
      - ./models:/build/models
      - ../data/models:/build/models/gguf:ro
    ports:
      - "8080:8080"
    environment:
      MODELS_PATH: /build/models

  auberge-app:
    depends_on:
      - localai
