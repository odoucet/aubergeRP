# RTX 3090 (24 GB VRAM)

x-models:
  llm_name: &llm_name gemma-4-e2b-it
  llm_ctx: &llm_ctx 8192
  llm_max_tokens: &llm_max_tokens 4096
  img_name: &img_name flux.2-klein-4b

services:
  localai:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  auberge-app:
    environment:
      AUBERGE_LLM_API_URL: http://localai:8080/v1
      AUBERGE_LLM_MODEL: *llm_name
      AUBERGE_LLM_CONTEXT_WINDOW: *llm_ctx
      AUBERGE_LLM_MAX_TOKENS: *llm_max_tokens
      AUBERGE_IMG_API_URL: http://localai:8080/v1
      AUBERGE_IMG_MODEL: *img_name
