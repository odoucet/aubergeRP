services:
  auberge-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: auberge-app
    user: "${UID}:${GID}"
    volumes:
      - ../data:/data
      - ../aubergeRP:/app/aubergeRP:ro
      - ../frontend:/app/frontend:ro
      - ../config.yaml:/app/config.yaml
    ports:
      - "${AUBERGE_PORT:-8123}:8123"
