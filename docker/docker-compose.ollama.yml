services:
  ollama:
    image: ollama/ollama:latest
    container_name: auberge-ai
    volumes:
      - ollama_storage:/root/.ollama
      - ../data/models:/data/models:ro
      - ./modelfiles:/modelfiles:ro
    ports:
      - "11434:11434"

  auberge-app:
    depends_on:
      - ollama

volumes:
  ollama_storage:
