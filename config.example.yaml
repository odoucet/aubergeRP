# aubergeRP Configuration
# Copy this file to config.yaml. All settings can be changed via the Admin UI.

app:
  # Host and port for the aubergeRP server
  host: "0.0.0.0"
  port: 8123
  # Log level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
  # Data directory (relative to project root or absolute path)
  data_dir: "data"

# Environment-variable overrides (take precedence over this file):
#   AUBERGE_DATA_DIR  → app.data_dir
#   AUBERGE_HOST      → app.host
#   AUBERGE_PORT      → app.port
#   AUBERGE_LOG_LEVEL → app.log_level
#   AUBERGE_USER_NAME → user.name
#   AUBERGE_ADMIN_PASSWORD_HASH → app.admin_password_hash (stable password across restarts)

# Active connector IDs. The Admin UI writes these.
# Leave empty on first start.
active_connectors:
  text: ""
  image: ""
  # video: ""   # post-MVP
  # audio: ""   # post-MVP

user:
  # Display name for the user in chat (used for {{user}} macro)
  name: "User"

# Chat / AI quality settings
chat:
  # Estimated context window of the active text model in tokens.
  context_window: 4096
  # Trigger conversation summarization when this fraction of the context is used.
  summarization_threshold: 0.75
  # Inject a guardrail when out-of-character jailbreak attempts are detected.
  ooc_protection: true

# Background media-cleanup scheduler (default: disabled)
scheduler:
  enabled: false
  # How often to run cleanup (seconds). Default: 24 hours.
  interval_seconds: 86400
  # Delete images older than this many days.
  cleanup_older_than_days: 30

# GUI customization (also editable in Admin → Customization)
gui:
  # Arbitrary CSS injected into every page.
  custom_css: ""
  # Raw HTML inserted just after the opening <header> tag.
  custom_header_html: ""
  # Raw HTML inserted just before the closing </footer> tag.
  custom_footer_html: ""
