<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <title>aubergeRP</title>
  <link rel="stylesheet" href="/css/main.css">

  <!-- AubergeRP favicon pack -->
  <link rel="icon" href="/favicons/favicon.svg" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="/favicons/apple-touch-icon.svg"/>
  <link rel="mask-icon" href="/favicons/safari-pinned-tab.svg" color="#f4b860"/>
  <link rel="manifest" href="/favicons/site.webmanifest"/>
  <meta name="theme-color" content="#1a0f08"/>

  <!-- Open Graph -->
  <meta property="og:title" content="AubergeRP"/>
  <meta property="og:description" content="Self-hosted chat & roleplay with local LLMs."/>
</head>
<body>

<div id="app">

<!-- Header -->
<header id="header" role="banner">
  <button class="hamburger" id="hamburger-btn" aria-label="Toggle sidebar" aria-expanded="false">☰</button>
  <div class="logo"></div>
  <button id="share-session-btn" class="share-btn" aria-label="Share session">Share session</button>
  <button id="fullscreen-btn" class="fullscreen-btn" aria-label="Toggle fullscreen">⛶</button>
  <a href="/admin/" class="admin-link" aria-label="Admin panel">Admin</a>
</header>

<!-- Main layout -->
<div id="main">

  <!-- Sidebar -->
  <nav id="sidebar" aria-label="Characters and conversations">

    <!-- Characters section -->
    <section class="sidebar-section" aria-labelledby="chars-heading">
      <h2 id="chars-heading">Characters</h2>
      <ul class="sidebar-list" id="char-list" role="listbox" aria-label="Character list"></ul>
    </section>

    <!-- Conversations section -->
    <section class="sidebar-section" aria-labelledby="convs-heading">
      <h2 id="convs-heading">Conversations</h2>
      <ul class="sidebar-list" id="conv-list" role="listbox" aria-label="Conversation list"></ul>
      <button class="new-conv-btn" id="new-conv-btn" aria-label="New conversation">
        ＋ New Conversation
      </button>
    </section>

  </nav>

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebar-overlay" aria-hidden="true"></div>

  <!-- Chat area -->
  <main id="chat-area" aria-label="Chat">

    <!-- Empty state (shown when no character is selected) -->
    <div id="empty-state" role="status">
      <p>No character selected.</p>
      <p>Select a character from the sidebar, or
        <a href="/admin/">import characters in the Admin panel</a>.
      </p>
    </div>

    <!-- Character header (hidden until character selected) -->
    <div id="char-header" style="display:none" role="region" aria-label="Active character">
      <img class="char-avatar" src="" alt="">
      <span class="char-name"></span>
    </div>

    <!-- Message list (hidden until character selected) -->
    <section id="message-list" style="display:none" aria-label="Messages" aria-live="polite"></section>

    <!-- Input area (hidden until character selected) -->
    <div id="input-area" style="display:none" role="form" aria-label="Send message">
      <textarea
        id="msg-input"
        rows="1"
        placeholder="Type dialogue... Use [ ] or { } for RP directions (Enter to send, Shift+Enter for new line)"
        title="Roleplay tip: wrap non-dialogue directions in [ ] or { }. Example: [whispers] I open the door."
        aria-label="Message input"
      ></textarea>
      <button id="send-btn" aria-label="Send message">Send</button>
    </div>

  </main>
</div>

<!-- Status bar (populated by layout.js) -->
<footer id="statusbar"></footer>

</div><!-- /#app -->

<!-- Toast -->
<div id="toast" role="alert" aria-live="assertive"></div>

<!-- Vendored libraries -->
<script src="/vendor/marked.min.js"></script>

<!-- App modules -->
<script type="module">
  import { applyGuiCustomization } from '/js/gui-customization.js';
  import { initStatusBar, initHeaderLogo } from '/js/layout.js';
  import { initCharacters, loadCharacters, setSelectedCharacter } from '/js/characters.js';
  import { initChat, onCharacterSelected, showToast } from '/js/chat.js';

  initStatusBar();
  initHeaderLogo();

  // Hamburger toggle (responsive sidebar)
  const hamburgerBtn = document.getElementById('hamburger-btn');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');

  function toggleSidebar(force) {
    const open = force !== undefined ? force : !sidebar.classList.contains('open');
    sidebar.classList.toggle('open', open);
    hamburgerBtn.setAttribute('aria-expanded', String(open));
  }

  hamburgerBtn.addEventListener('click', () => toggleSidebar());
  overlay.addEventListener('click', () => toggleSidebar(false));
  document.addEventListener('closeSidebar', () => toggleSidebar(false));

  // Close sidebar on mobile when a character is clicked
  function onCharSelected(character) {
    if (window.innerWidth < 1024) toggleSidebar(false);
    setSelectedCharacter(character.id);
    localStorage.setItem('auberge_last_character_id', character.id);
    onCharacterSelected(character).catch(err => showToast(err.message));
  }

  // Fullscreen toggle
  const fullscreenBtn = document.getElementById('fullscreen-btn');
  fullscreenBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  });
  document.addEventListener('fullscreenchange', () => {
    const isFs = !!document.fullscreenElement;
    fullscreenBtn.textContent = isFs ? '⊡' : '⛶';
    fullscreenBtn.setAttribute('aria-label', isFs ? 'Exit fullscreen' : 'Toggle fullscreen');
  });

  // Init
  applyGuiCustomization();
  initCharacters(onCharSelected);
  initChat();

  loadCharacters().then(characters => {
    if (!characters || characters.length === 0) return;
    const lastId = localStorage.getItem('auberge_last_character_id');
    const toSelect = (lastId && characters.find(c => c.id === lastId)) || characters[0];
    onCharSelected(toSelect);
  }).catch(err => showToast('Failed to load characters: ' + err.message));
</script>

</body>
</html>
